<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday! 🎂</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
body {
    margin: 0;
    font-family: sans-serif;
    color: white;
    overflow: hidden;
}

/* 🌈 GRADIENT LAYER */
#gradient-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -3;
    opacity: 0.5;
    background: linear-gradient(-45deg, #ff4e50, #fc913a, #36d1dc, #5b86e5);
    background-size: 400% 400%;
    animation: gradientMove 12s ease infinite;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* 🎥 SLIDESHOW */
#background-slideshow {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
    overflow: hidden;
}

.slides {
    display: flex;
    width: 500%;
    height: 100%;
    animation: slideShow 25s infinite;
}

.slide {
    width: 100%;
    height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0.6; /* 👈 lets gradient show through */
}

@keyframes slideShow {
    0%,20% { transform: translateX(0); }
    25%,45% { transform: translateX(-20%); }
    50%,70% { transform: translateX(-40%); }
    75%,95% { transform: translateX(-60%); }
    100% { transform: translateX(-80%); }
}

/* 🌑 DARK OVERLAY (top layer for readability) */
#overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: -1;
}

/* 🎁 Gift */
#gift-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
}

#gift-container:hover {
    transform: translate(-50%, -50%) scale(1.1);
}

#gift-box {
    font-size: 6rem;
}

/* 🎉 Main content */
#main-content {
    display: none;
    text-align: center;
    padding: 2rem;
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

h1 {
    font-size: 3rem;
}

.balloon {
    font-size: 3rem;
    animation: float 3s infinite;
}

@keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
}

button {
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #e91e63;
    font-weight: bold;
    cursor: pointer;
    margin-top: 20px;
}
</style>
</head>

<body>

<!-- 🌈 Gradient -->
<div id="gradient-bg"></div>

<!-- 🎥 Images -->
<div id="background-slideshow">
    <div class="slides">
        <div class="slide" style="background-image:url('https://i.pinimg.com/736x/47/89/b8/4789b870cebdfe33a8783a34760e6214.jpg');"></div>
        <div class="slide" style="background-image:url('https://i.pinimg.com/736x/8d/39/19/8d3919f44d358f4a5cc126e14305458b.jpg');"></div>
        <div class="slide" style="background-image:url('https://i.pinimg.com/736x/5c/62/48/5c624807b0fa9797d0ea741693ea4ebd.jpg');"></div>
        <div class="slide" style="background-image:url('https://i.pinimg.com/736x/5a/01/82/5a0182c59b0f694375f4c9cb86e817a9.jpg');"></div>
        <div class="slide" style="background-image:url('https://i.pinimg.com/736x/f4/f4/58/f4f458d8607a75a8244c10e4c50e5504.jpg');"></div>
    </div>
</div>

<!-- 🌑 Overlay -->
<div id="overlay"></div>

<!-- 🎁 Gift -->
<div id="gift-container">
    <div id="gift-box">🎁</div>
    <h2>Tap to open your surprise!</h2>
</div>

<!-- 🎉 Content -->
<div id="main-content">
    <div>
        <span class="balloon">🎈</span>
        <span class="balloon">✨</span>
        <span class="balloon">🎈</span>
    </div>

    <h1>Happy Birthday, Bestie! 🥳</h1>
    <p id="typewriter"></p>

    <button onclick="launchConfetti()">More Magic ✨</button>
</div>

<audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
const gift = document.getElementById("gift-container");
const main = document.getElementById("main-content");
const text = document.getElementById("typewriter");
const music = document.getElementById("music");

const message = "Today is all about you 🎉. May your life be filled with happiness, crazy memories, and success. You're leveling up 🚀";

function typeWriter(i = 0) {
    if (i < message.length) {
        text.innerHTML += message.charAt(i);
        setTimeout(() => typeWriter(i + 1), 40);
    }
}

function launchConfetti() {
    confetti({
        particleCount: 150,
        spread: 70,
        origin: { y: 0.6 }
    });
}

gift.addEventListener("click", async () => {
    gift.style.display = "none";
    main.style.display = "block";

    try {
        await music.play();
    } catch(e) {}

    launchConfetti();
    typeWriter();
});
</script>

</body>
</html>
